<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="hideBehindRight">
      <rect x="0" y="0" width="300" height="200" /> </clipPath>
      <clipPath id="hideBehindLeft">
      <rect x="300" y="0" width="300" height="200" />
      </clipPath>


  </defs>

  <style>
    @keyframes slideOutLeft {
      0% { transform: translateX(150px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }

    @keyframes slideOutRight {
      0% { transform: translateX(-150px); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }

    @keyframes popIn {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .center-group {
      animation: popIn 0.5s ease-out forwards;
      transform-origin: center;
      z-index: 10;
    }
    
    .left-group {
      clip-path: url(#hideBehindRight);
    }
    .right-group {
      clip-path: url(#hideBehindLeft);
    }
    .team-1 {
      animation: slideOutLeft 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.2) 0.4s forwards;
      opacity: 0;
    }

    .team-2 {
      animation: slideOutRight 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.2) 0.4s forwards;
      opacity: 0;
    }

    text {
      font-family: sans-serif;
      font-weight: bold;
      fill: white;
    }

    .red {
      fill: #da291c;
    }

    .white {
      fill: #fff;
    }
  </style>

  <g class="left-group">
    <g class="team-1">
      <rect x="25" y="60" width="300" height="80" rx="10" fill="#2C3E50" />
      <text x="150" y="100" font-size="24" text-anchor="middle" dominant-baseline="central">Team 1</text>
    </g>
  </g>

  <g class="right-group">
    <g class="team-2">
      <rect x="275" y="60" width="300" height="80" rx="10" fill="#C0392B" />
      <text x="450" y="100" font-size="24" text-anchor="middle" dominant-baseline="central">Team 2</text>
    </g>
  </g>

